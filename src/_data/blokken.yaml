lijst:
  - type: kaarten
    zichtbaar: true
    in_menu: true
    menutekst: Diensten
    anker: diensten
    stijl: normaal
    label: Diensten
    titel: Waarmee kunnen wij u helpen?
    tekst: Wij vervoeren tegenwoordig hoofdzakelijk rijplaten en draglineschotten
      voor de bouw, voor zowel particulieren als bedrijven. Met onze eigen open
      opleggers en, indien gewenst, een laadkraan aan boord zorgen wij ervoor
      dat uw lading snel en veilig op de juiste plek komt — of het nu gaat om
      een eenmalige rit of een terugkerende opdracht.
    items:
      - icoon: src/assets/icons/vrachtwagen.svg
        titel: Particulier en zakelijk
        tekst: "Of u nu als particulier eenmalig iets vervoerd wilt hebben, of
          als bedrijf regelmatig transport nodig heeft: wij denken met u mee
          over de meest praktische oplossing, met persoonlijk contact en
          duidelijke afspraken."
      - icoon: src/assets/icons/vrachtwagen.svg
        titel: Open opleggers
        tekst: Wij rijden met open opleggers, uitstekend geschikt voor het
          vervoer van rijplaten, draglineschotten en ander bouwmaterieel dat
          niet in een gesloten wagen past.
      - icoon: src/assets/icons/vrachtwagen.svg
        titel: Laadkraan en groot transport
        tekst: Onze voertuigen zijn desgewenst uitgerust met een laadkraan,
          zodat laden en lossen ook zonder extra hulpmiddelen ter plaatse
          mogelijk is. Ook voor groot of zwaar transport bent u bij ons aan
          het juiste adres.

  - type: kaarten
    zichtbaar: true
    in_menu: true
    menutekst: Werkzaamheden
    anker: werkzaamheden
    stijl: alt
    label: Werkzaamheden
    titel: Waar wij dagelijks mee werken
    tekst: Een greep uit het soort lading dat wij regelmatig voor particulieren en
      bedrijven in en rond Bedum vervoeren — van bouwmaterieel tot pallets.
    items:
      - icoon: src/assets/icons/machines.svg
        titel: Machines
        tekst: Vervoer van machines voor de bouw en industrie, met de nodige
          zorg voor een veilige belading.
      - icoon: src/assets/icons/rijplaten.svg
        titel: Rijplaten
        tekst: Transport van rijplaten en draglineschotten, veelgebruikt voor
          tijdelijke bouwwegen op de bouwplaats.
      - icoon: src/assets/icons/stenen.svg
        titel: Stenen
        tekst: Vervoer van stenen en andere bouwmaterialen, van een kleine
          partij tot een volle lading.
      - icoon: src/assets/icons/container.svg
        titel: Container tot 20ft
        tekst: Transport van containers tot 20 voet, snel en zonder poespas
          geregeld.
      - icoon: src/assets/icons/pallets.svg
        titel: Pallets
        tekst: Vervoer van pallets voor particulier en bedrijf, ook voor
          kleinere hoeveelheden.

