  - type: tekst-met-foto
    zichtbaar: true
    in_menu: true
    menutekst: Over ons
    anker: over-ons
    label: Over ons
    titel: Een vertrouwd familiebedrijf uit Bedum
    afbeelding: src/assets/img-full/DSC02312.jpg
    afbeelding_alt: Gebr. Drijfhout aan het werk
    teksten:
      - Gebr. Drijfhout is al meer dan zestig jaar een vertrouwde naam in
        transport in en rond Bedum, Groningen. Wat begon als een klein
        familiebedrijf is in de loop der jaren uitgegroeid tot een betrouwbare
        partner voor particulieren en bedrijven die op zoek zijn naar
        transport in de regio.
      - "We werken met eigen materieel, denken mee over de beste oplossing en
        staan bekend om onze persoonlijke aanpak: korte lijnen, duidelijke
        afspraken en werk dat gewoon goed gebeurt. Of het nu gaat om een
        eenmalig transport of een terugkerende opdracht, u weet bij ons
        precies waar u aan toe bent."
    punten:
      - Ruime ervaring met transport voor particulier en bedrijf
      - Eigen open opleggers, desgewenst met laadkraan
      - Persoonlijk contact en snelle planning

  - type: tekst
    zichtbaar: true
    in_menu: true
    menutekst: Historie
    anker: historie
    stijl: normaal
    label: Historie
    titel: Historie
    teksten:
      - Gebr. Drijfhout is een familiebedrijf met meer dan 60 jaar ervaring in
        transport, geleid door Helenus Drijfhout samen met zijn broers Albert
        en Sjabbé en enkele neven.
      - "We zijn gespecialiseerd in het vervoeren én leggen van rijplaten,
        onder andere met een truck die is uitgerust met besturing op afstand
        om rijplaten precies op de juiste plek uit te leggen."
      - In de loop der jaren hebben we miljoenen kilometers gereden voor
        particuliere en zakelijke klanten in de regio.
      - Gebr. Drijfhout was naast transport ook jarenlang actief met een eigen
        zandhandel.
      - Vanwege onze verhuizing naar het industrieterrein van Bedum hebben wij
        besloten te stoppen met de zandhandel. Zaterdag 12 juli 2025 was onze
        laatste verkoopdag hiervoor. Wij danken al onze klanten voor de
        afgelopen jaren.
      - Sindsdien richten wij ons volledig op transport voor particulieren en
        bedrijven.
