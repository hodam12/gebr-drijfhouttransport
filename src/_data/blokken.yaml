  - teksten:
      - Gebr. Drijfhout is al meer dan vijftig jaar een vertrouwde naam in
        transport in en rond Bedum, Groningen. Wat begon als een klein
        familiebedrijf is uitgegroeid tot een betrouwbare partner voor
        particulieren en bedrijven die op zoek zijn naar transport, een
        aanhangwagen of een container.
      - "We werken met eigen materieel, denken mee over de beste oplossing en
        staan bekend om onze persoonlijke aanpak: korte lijnen, duidelijke
        afspraken en werk dat gewoon goed gebeurt."
    titel: Een vertrouwd familiebedrijf uit Bedum
    anker: over-ons
    afbeelding: src/assets/img-full/DSC02312.jpg
    zichtbaar: true
    punten:
      - Ruime ervaring met transport voor particulier en bedrijf
      - Eigen voertuigen, waaronder tautliner en containertruck met haakarm
      - Persoonlijk contact en snelle planning
    label: Over ons
