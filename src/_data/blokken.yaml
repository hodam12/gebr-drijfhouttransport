lijst:
  - type: kaarten
    zichtbaar: true
    in_menu: true
    menutekst: Diensten
    anker: diensten
    stijl: normaal
    label: Diensten
    titel: Waarmee kunnen wij u helpen?
    tekst: Wij vervoeren tegenwoordig hoofdzakelijk rijplaten en draglineschotten
      voor de bouw, voor zowel particulieren als bedrijven. Met onze eigen open
      opleggers en, indien gewenst, een laadkraan aan boord zorgen wij ervoor
      dat uw lading snel en veilig op de juiste plek komt — of het nu gaat om
      een eenmalige rit of een terugkerende opdracht.
    items:
      - icoon: src/assets/icons/vrachtwagen.svg
        titel: Particulier en zakelijk
        tekst: "Of u nu als particulier eenmalig iets vervoerd wilt hebben, of
          als bedrijf regelmatig transport nodig heeft: wij denken met u mee
          over de meest praktische oplossing, met persoonlijk contact en
          duidelijke afspraken."
      - icoon: src/assets/icons/vrachtwagen.svg
        titel: Open opleggers
        tekst: Wij rijden met open opleggers, uitstekend geschikt voor het
          vervoer van rijplaten, draglineschotten en ander bouwmaterieel dat
          niet in een gesloten wagen past.
      - icoon: src/assets/icons/vrachtwagen.svg
        titel: Laadkraan en groot transport
        tekst: Onze voertuigen zijn desgewenst uitgerust met een laadkraan,
          zodat laden en lossen ook zonder extra hulpmiddelen ter plaatse
          mogelijk is. Ook voor groot of zwaar transport bent u bij ons aan
          het juiste adres.

  - type: kaarten
    zichtbaar: true
    in_menu: true
    menutekst: Werkzaamheden
    anker: werkzaamheden
    stijl: alt
    label: Werkzaamheden
    titel: Waar wij dagelijks mee werken
    tekst: Een greep uit het soort lading dat wij regelmatig voor particulieren en
      bedrijven in en rond Bedum vervoeren — van bouwmaterieel tot pallets.
    items:
      - icoon: src/assets/icons/machines.svg
        titel: Machines
        tekst: Vervoer van machines voor de bouw en industrie, met de nodige
          zorg voor een veilige belading.
      - icoon: src/assets/icons/rijplaten.svg
        titel: Rijplaten
        tekst: Transport van rijplaten en draglineschotten, veelgebruikt voor
          tijdelijke bouwwegen op de bouwplaats.
      - icoon: src/assets/icons/stenen.svg
        titel: Stenen
        tekst: Vervoer van stenen en andere bouwmaterialen, van een kleine
          partij tot een volle lading.
      - icoon: src/assets/icons/container.svg
        titel: Container tot 20ft
        tekst: Transport van containers tot 20 voet, snel en zonder poespas
          geregeld.
      - icoon: src/assets/icons/pallets.svg
        titel: Pallets
        tekst: Vervoer van pallets voor particulier en bedrijf, ook voor
          kleinere hoeveelheden.

  - type: galerij
    zichtbaar: true
    in_menu: true
    menutekst: Wagenpark
    anker: wagenpark
    stijl: normaal
    label: Wagenpark
    titel: Modern materieel, vakkundig ingezet
    tekst: Een impressie van onze voertuigen en het werk dat we dagelijks
      verrichten in en rond Bedum. Met onze open opleggers, desgewenst met
      laadkraan, zijn we inzetbaar voor uiteenlopende transportklussen.
    fotos:
      - afbeelding: src/assets/img-full/gallery_52.jpg
        alt: Vrachtwagen van Gebr. Drijfhout
      - afbeelding: src/assets/img-full/fleet_zxandkipper.jpg
        alt: Kipperwagen van het wagenpark
      - afbeelding: src/assets/img-full/gallery_56.jpg
        alt: Transportwagen aan het werk
      - afbeelding: src/assets/img-full/fleet_280053_606537289448647_3993714222030207255_o.jpg
        alt: Vrachtwagen met aanhanger
      - afbeelding: src/assets/img-full/gallery_62.jpg
        alt: Materieel van Gebr. Drijfhout
      - afbeelding: src/assets/img-full/fleet_10459109_485986458170398_6099323526093723346_n.jpg
        alt: Vrachtwagen in de regio Bedum
      - afbeelding: src/assets/img-full/gallery_65.jpg
        alt: Voertuig van het wagenpark
      - afbeelding: src/assets/img-full/drijfhout3wa2.jpg
        alt: Gebr. Drijfhout transport

  - type: tekst-met-foto
    zichtbaar: true
    in_menu: true
    menutekst: Over ons
    anker: over-ons
    label: Over ons
    titel: Een vertrouwd familiebedrijf uit Bedum
    afbeelding: src/assets/img-full/DSC02312.jpg
    afbeelding_alt: Gebr. Drijfhout aan het werk
    teksten:
      - Gebr. Drijfhout is al meer dan vijfenzestig jaar een vertrouwde naam in
        transport in en rond Bedum, Groningen. Wat begon als een klein
        familiebedrijf is in de loop der jaren uitgegroeid tot een betrouwbare
        partner voor particulieren en bedrijven die op zoek zijn naar
        transport in de regio.
      - "We werken met eigen materieel, denken mee over de beste oplossing en
        staan bekend om onze persoonlijke aanpak: korte lijnen, duidelijke
        afspraken en werk dat gewoon goed gebeurt. Of het nu gaat om een
        eenmalig transport of een terugkerende opdracht, u weet bij ons
        precies waar u aan toe bent."
    punten:
      - Ruime ervaring met transport voor particulier en bedrijf
      - Eigen open opleggers, desgewenst met laadkraan
      - Persoonlijk contact en snelle planning

  - type: tijdlijn
    zichtbaar: true
    in_menu: true
    menutekst: Historie
    anker: historie
    stijl: normaal
    label: Historie
    titel: Van vlas en stro tot rijplatenspecialist
    tekst: Gebr. Drijfhout is een familiebedrijf met meer dan 65 jaar ervaring
      in transport, geleid door Helenus Drijfhout samen met zijn broers
      Albert en Sjabbe en enkele neven.
    items:
      - jaar: "1961"
        titel: De start in Lageland
        tekst: Het begon met het vervoeren van vlas en stro. Eind jaren
          zestig kwam daar het vervoeren van bieten bij, om het hele jaar
          rond werk te hebben.
      - jaar: "1970"
        titel: Verhuizing naar Bedum
        tekst: Het bedrijf verhuisde naar Bedum en groeide daar uit tot het
          bedrijf van vandaag.
      - jaar: "2012"
        titel: Rijplaten met afstandsbediening
        tekst: Sinds 2012 rijden we met kraanopleggers met afstandsbediening,
          waarmee we rijplaten niet alleen vervoeren, maar ook precies op de
          juiste plek leggen en weer ophalen.
      - jaar: "2025"
        titel: Naar het industrieterrein
        tekst: Vanwege onze verhuizing naar het industrieterrein van Bedum
          is de zandhandel gestopt; zaterdag 12 juli 2025 was de laatste
          verkoopdag hiervoor. Sindsdien richten wij ons volledig op
          transport voor particulieren en bedrijven.
